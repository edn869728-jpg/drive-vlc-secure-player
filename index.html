<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<title>Drive VLC Secure Player</title>
<style>
:root{--bg:#07111f;--line:rgba(148,163,184,.22);--text:#f8fafc;--muted:#94a3b8;--blue:#38bdf8;--orange:#f97316;--red:#ef4444;--green:#10b981;--purple:#8b5cf6}
*{box-sizing:border-box}body{margin:0;padding:14px;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:linear-gradient(180deg,#07111f,#0f172a 45%,#07111f)}
.wrap{max-width:1180px;margin:auto;padding-bottom:110px}.top{position:sticky;top:0;z-index:10;margin:-14px -14px 14px;padding:16px 14px 12px;background:rgba(7,17,31,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
h1{margin:0;font-size:23px;background:linear-gradient(90deg,var(--blue),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sub{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.5}
button{border:1px solid var(--line);background:rgba(51,65,85,.75);color:#fff;border-radius:999px;padding:9px 12px;font-weight:900;font-size:12px;cursor:pointer}button.primary{border:0;background:linear-gradient(135deg,var(--blue),var(--orange))}button.danger{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.35);color:#fecaca}
.tools{display:grid;grid-template-columns:1fr auto;gap:10px}.search{position:relative}.search input,.login input{width:100%;border:1px solid var(--line);background:rgba(15,23,42,.86);color:#fff;border-radius:14px;padding:12px 14px;font-size:15px}.search input{padding-left:40px}.search span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.filters{display:flex;gap:6px;padding:5px;border:1px solid var(--line);border-radius:999px;background:rgba(15,23,42,.72)}.filters button{background:transparent;color:var(--muted);border:0;padding:7px 10px}.filters button.active{color:#fff;background:linear-gradient(135deg,var(--blue),var(--orange))}
.banner{display:none;margin-top:12px;border-radius:14px;padding:10px 12px;font-size:13px;font-weight:800;line-height:1.5}.banner.show{display:block}.banner.admin{border:1px solid rgba(56,189,248,.3);background:rgba(56,189,248,.12);color:#e0f2fe}.banner.token{border:1px solid rgba(245,158,11,.3);background:rgba(245,158,11,.12);color:#fde68a}
.card,.login{border:1px solid var(--line);background:rgba(17,28,47,.75);border-radius:18px;padding:18px;margin:16px 0;box-shadow:0 16px 40px rgba(0,0,0,.25)}.login p{color:var(--muted);font-size:13px;line-height:1.6}.login-row{display:grid;grid-template-columns:1fr auto;gap:10px}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;min-height:120px;color:var(--blue);font-weight:900}.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0}.sum{border:1px solid var(--line);background:rgba(17,28,47,.72);border-radius:16px;padding:13px}.sum small{color:var(--muted);display:block;margin-bottom:6px}.sum b{font-size:21px}
.folder{margin:22px 0 30px}.folder-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.folder-name{font-size:18px;font-weight:950;color:#e0f2fe}.count{color:var(--muted);font-size:12px;font-weight:900;border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:rgba(15,23,42,.78)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(315px,1fr));gap:14px}.media{position:relative;border:1px solid var(--line);background:linear-gradient(180deg,rgba(22,34,56,.95),rgba(17,28,47,.92));border-radius:18px;padding:14px}.media.selected{border-color:rgba(249,115,22,.8)}
.check{position:absolute;right:12px;top:12px}.check input{width:22px;height:22px;accent-color:var(--orange)}.media-top{display:grid;grid-template-columns:auto 1fr;gap:11px;padding-right:30px;margin-bottom:12px}.icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(56,189,248,.12);font-size:20px}.name{font-size:17px;font-weight:950;line-height:1.35;word-break:break-word;margin-bottom:7px}.meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.badge{border-radius:999px;padding:4px 8px;color:#fff;font-size:10px;font-weight:950}.mp3{background:var(--green)}.mp4{background:#3b82f6}.wav{background:var(--purple)}.m4a,.aac,.flac,.other{background:#64748b}.mini{color:var(--muted);font-size:12px}
.row{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:8px}.action{min-height:38px;border-radius:12px;border:1px solid transparent;padding:9px 10px;color:#fff;text-decoration:none;font-size:13px;font-weight:950;display:flex;align-items:center;justify-content:center;white-space:nowrap;cursor:pointer}.vlc{background:linear-gradient(135deg,var(--orange),#ea580c)}.open{background:rgba(56,189,248,.14);border-color:rgba(56,189,248,.28);color:#e0f2fe}.copy{background:rgba(51,65,85,.78);border-color:rgba(148,163,184,.24);color:#cbd5e1}
.empty{text-align:center;color:var(--muted);padding:46px 20px;border:1px dashed rgba(148,163,184,.28);border-radius:20px;background:rgba(15,23,42,.42);margin-top:18px}.empty b{color:#fff;font-size:18px;display:block;margin-bottom:8px}
.panel{display:none;position:fixed;left:14px;right:14px;bottom:14px;z-index:15;max-width:1180px;margin:auto;border:1px solid rgba(249,115,22,.28);background:rgba(7,17,31,.92);backdrop-filter:blur(16px);border-radius:20px;padding:12px}.panel.show{display:block}.panel-main{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}.bubble{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,var(--orange),#ea580c);display:flex;align-items:center;justify-content:center;font-weight:950;font-size:18px}.psub{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pactions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.modal-bg{display:none;position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.64);padding:18px;align-items:center;justify-content:center}.modal-bg.show{display:flex}.modal{width:100%;max-width:760px;max-height:calc(100vh - 36px);overflow:auto;border:1px solid var(--line);background:#0f172a;border-radius:22px;padding:18px}.modal p{color:var(--muted);font-size:13px}.modal textarea{width:100%;min-height:116px;resize:vertical;border:1px solid var(--line);background:rgba(15,23,42,.92);color:#e2e8f0;border-radius:14px;padding:12px}.share-item{border:1px solid var(--line);background:rgba(17,28,47,.72);border-radius:14px;padding:10px;margin-top:8px;font-size:13px;line-height:1.5}.share-item.disabled{opacity:.65}.modal-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:14px}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:40;background:rgba(16,185,129,.96);color:#fff;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:950;transition:.18s;box-shadow:0 14px 36px rgba(0,0,0,.32);pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.err{color:var(--red);font-weight:900;text-align:center;line-height:1.6}.hint{color:var(--muted);font-size:12px;text-align:center;margin-top:12px}
@media(max-width:760px){body{padding:12px}.top{margin:-12px -12px 14px;padding:16px 12px 12px}.head{display:block}h1{font-size:21px}.actions{justify-content:flex-start;margin-top:12px}.tools,.login-row{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.panel-main{grid-template-columns:auto 1fr}.pactions{grid-column:1/-1}.pactions button{flex:1}}
</style>
</head>
<body>
<div class="top"><div class="head">
  <div><h1>雲端影音播放器</h1><div class="sub">試算表管理播放清單網址｜可找回、可停用｜session token 流動保護</div></div>
  <div class="actions">
    <button class="primary" onclick="forceAdminLogin()">管理登入</button>
    <button id="refreshBtn" class="primary" onclick="fetchData(true)" style="display:none;">🔄 更新</button>
    <button id="shortcutBtn" onclick="openShortcutTokenModal()" style="display:none;">📲 捷徑 Token</button>
    <button id="manageBtn" onclick="openPlaylistManager()" style="display:none;">🧾 網址管理</button>
    <button onclick="clearFrontendCache()">🧹 清快取</button>
    <button id="logoutBtn" class="danger" onclick="logoutAdmin()" style="display:none;">登出</button>
  </div>
</div>
<div id="tools" class="tools" style="display:none;">
  <div class="search"><span>🔎</span><input id="searchInput" type="search" placeholder="搜尋檔名或資料夾..." oninput="renderMedia()"></div>
  <div class="filters"><button class="active" data-type="all" onclick="setTypeFilter('all')">全部</button><button data-type="mp3" onclick="setTypeFilter('mp3')">MP3</button><button data-type="mp4" onclick="setTypeFilter('mp4')">MP4</button><button data-type="wav" onclick="setTypeFilter('wav')">WAV</button></div>
</div>
<div id="banner" class="banner"></div></div>

<main class="wrap">
  <section id="loginCard" class="login" style="display:none;">
    <h2>管理登入</h2>
    <p>完整清單需要登入。限定播放清單網址會寫入試算表，之後可找回、可停用。</p>
    <div class="login-row"><input id="loginKey" type="password" placeholder="輸入管理登入密鑰" autocomplete="off" onkeydown="if(event.key==='Enter') loginAdmin();"><button class="primary" onclick="loginAdmin()">登入並載入</button></div>
  </section>
  <div id="summary" class="summary" style="display:none;"></div>
  <div id="loading" class="card loading" style="display:none;">正在載入...</div>
  <div id="main"></div>
</main>

<section id="panel" class="panel"><div class="panel-main">
  <div id="selCount" class="bubble">0</div>
  <div><b>當次臨時播放清單</b><div id="selSub" class="psub">尚未選擇歌曲</div></div>
  <div class="pactions"><button class="primary" onclick="openSelectedInVlc()">▶ 逐首開 VLC</button><button onclick="copySelectedUrls()">複製網址</button><button id="shareBtn" onclick="createSecurePlaylist()">產生限定網址</button><button onclick="clearSelection()">清除</button></div>
</div></section>

<div id="modalBg" class="modal-bg"><div class="modal">
  <h2 id="modalTitle">視窗</h2>
  <p id="modalText"></p>
  <textarea id="modalBox" readonly></textarea>
  <div id="modalList"></div>
  <div class="modal-actions" id="modalActions"></div>
</div></div>
<div id="toast" class="toast">完成</div>

<script>
const CONFIG={GAS_API_URL:'https://script.google.com/macros/s/AKfycbziC1SpE1GgYdGLPKTigihBL6DZhIccS7dkAUI9ZFrzZFgDpvEs3-diWm4kviaLgn-U/exec',APP_VERSION:'2026-06-10-sheet-v2',SESSION_KEY:'drive_vlc_session_sheet_v2',OPEN_VLC_DELAY_MS:850,USE_JSONP_FALLBACK:true};
let mode='guest',playlistToken='',allMedia=[],selected=new Set(),filterType='all',latestShareUrl='';
window.addEventListener('load',init);

function init(){
  importSessionFromHash();
  const url=new URL(location.href);
  playlistToken=url.searchParams.get('token')||'';
  if(url.searchParams.get('admin')==='1'){showLogin();return;}
  if(playlistToken){mode='playlist';showPlayer('token','限定區：後端只回傳此 token 允許的歌曲；試算表停用後此網址立即失效。');fetchData(false);return;}
  if(getSession()){mode='admin';showPlayer('admin','管理模式：限定網址會寫入試算表，可找回、可停用。');fetchData(false);return;}
  showLogin();
}
function importSessionFromHash(){const h=String(location.hash||'');if(!h.startsWith('#session='))return;const t=decodeURIComponent(h.slice(9));if(t){setSession(t);history.replaceState(null,'',location.origin+location.pathname+'?admin=1');}}
function forceAdminLogin(){playlistToken='';mode='guest';showLogin();history.replaceState(null,'',location.origin+location.pathname+'?admin=1');}
function showLogin(){mode='guest';loginCard.style.display='block';tools.style.display='none';refreshBtn.style.display='none';shortcutBtn.style.display='none';manageBtn.style.display='none';logoutBtn.style.display='none';main.innerHTML='';summary.style.display='none';updatePanel();banner.className='banner show token';banner.textContent='未登入：完整清單不會載入。';}
function showPlayer(kind,msg){loginCard.style.display='none';tools.style.display='grid';refreshBtn.style.display='inline-block';shortcutBtn.style.display=kind==='admin'?'inline-block':'none';manageBtn.style.display=kind==='admin'?'inline-block':'none';logoutBtn.style.display=kind==='admin'?'inline-block':'none';shareBtn.style.display=kind==='admin'?'inline-block':'none';banner.className='banner show '+(kind==='admin'?'admin':'token');banner.textContent=msg;}
function loginAdmin(){const key=(loginKey.value||'').trim();if(!key)return toast('請輸入管理登入密鑰',true);setLoading('正在登入...');api({action:'adminLogin',loginKey:key,includeData:'1'}).then(r=>{if(!r.ok||!r.sessionToken)throw new Error(r.error||'登入失敗');setSession(r.sessionToken);mode='admin';showPlayer('admin','登入成功：限定網址會寫入試算表。');allMedia=normalize(r.data||[]);renderMedia();toast('登入成功');}).catch(e=>{showError(e);removeSession();showLogin();});}
function logoutAdmin(){removeSession();allMedia=[];selected=new Set();main.innerHTML='';updatePanel();showLogin();toast('已登出');}
function fetchData(force){if(mode==='guest')return showLogin();setLoading(force?'正在強制更新...':'正在載入...');const p=mode==='playlist'?{action:'getPlaylist',token:playlistToken}:{action:'getMediaFiles',sessionToken:getSession(),forceRefresh:force?'1':'0'};api(p).then(r=>{if(!r.ok)throw new Error(r.error||'讀取失敗');acceptNextSession(r);allMedia=normalize(r.data||[]);selected=new Set();renderMedia();updatePanel();}).catch(e=>{showError(e);if(mode==='admin'){removeSession();showLogin();}});}
function createSecurePlaylist(){if(mode!=='admin')return toast('只有管理模式可以建立限定網址',true);const items=getSelected();if(!items.length)return toast('請先勾選歌曲',true);const title=prompt('限定清單名稱','限定播放清單')||'限定播放清單';const days=Math.max(1,Math.min(3650,parseInt(prompt('有效天數','30')||'30',10)||30));api({action:'createPlaylist',sessionToken:getSession(),title,expireDays:String(days),frontendUrl:location.origin+location.pathname,ids:b64url(JSON.stringify(items.map(x=>x.id)))}).then(r=>{if(!r.ok||!r.token)throw new Error(r.error||'建立失敗');acceptNextSession(r);latestShareUrl=r.playlistUrl||location.origin+location.pathname+'?token='+encodeURIComponent(r.token);showModal('試算表限定播放清單網址','已寫入後端試算表，可找回、可停用。',latestShareUrl,'<button class="primary" onclick="copyShareUrl()">複製限定網址</button><button onclick="openShareUrl()">開啟測試</button><button onclick="openPlaylistManager()">網址管理</button><button onclick="closeModal()">關閉</button>');modalList.innerHTML=items.map((x,i)=>'<div class="share-item">'+esc((i+1)+'. '+x.name+'｜'+x.folder)+'</div>').join('');toast('限定網址已建立並寫入試算表');}).catch(e=>toast(e.message||'建立失敗',true));}
function openPlaylistManager(){if(mode!=='admin')return toast('請先登入',true);showModal('播放清單網址管理','讀取中...','','<button onclick="closeModal()">關閉</button>');api({action:'listPlaylists',sessionToken:getSession()}).then(r=>{if(!r.ok)throw new Error(r.error||'讀取失敗');acceptNextSession(r);modalText.textContent='資料來自後端試算表。停用後網址立即不能看。';modalBox.value='共 '+(r.rows||[]).length+' 筆';modalActions.innerHTML='<button class="primary" onclick="openPlaylistManager()">重新整理</button><button onclick="closeModal()">關閉</button>';modalList.innerHTML=(r.rows||[]).map(renderPlaylistRow).join('');}).catch(e=>toast(e.message||'讀取失敗',true));}
function renderPlaylistRow(r){const off=String(r.status).toLowerCase()!=='active';const btn=off?'<button onclick="setPlaylistStatus('+r.rowIndex+',\\'active\\')">啟用</button>':'<button class="danger" onclick="setPlaylistStatus('+r.rowIndex+',\\'disabled\\')">停用</button>';return '<div class="share-item '+(off?'disabled':'')+'"><b>'+esc(r.title||'未命名')+'</b><br>狀態：'+esc(r.status||'')+'｜歌曲：'+esc(r.item_count||'')+'｜到期：'+esc(r.expires_at||'')+'<br><small>'+esc(r.playlist_url||'')+'</small><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;"><button onclick="copyText(\\''+escJs(r.playlist_url||'')+'\\',\\'已複製網址\\')">複製</button>'+btn+'</div></div>';}
function setPlaylistStatus(rowIndex,status){api({action:'setPlaylistStatus',sessionToken:getSession(),rowIndex:String(rowIndex),status,note:'from web manager'}).then(r=>{if(!r.ok)throw new Error(r.error||'更新失敗');acceptNextSession(r);toast(status==='active'?'已啟用':'已停用');openPlaylistManager();}).catch(e=>toast(e.message||'更新失敗',true));}
function openShortcutTokenModal(){const t=getSession();const url=location.origin+location.pathname+'#session='+encodeURIComponent(t||'');showModal('iOS 捷徑 Token','每次 API 成功後保存 nextSessionToken，舊 token 會失效。','目前 token：\n'+(t||'沒有')+'\n\n匯入網址：\n'+url+'\n\n換新 token API：\n'+CONFIG.GAS_API_URL+'?action=refreshSession&sessionToken='+encodeURIComponent(t||''),'<button class="primary" onclick="copyModalText()">複製全部</button><button onclick="refreshSessionOnly()">換新 token</button><button onclick="closeModal()">關閉</button>');}
function refreshSessionOnly(){api({action:'refreshSession',sessionToken:getSession()}).then(r=>{if(!r.ok||!r.nextSessionToken)throw new Error(r.error||'更新失敗');setSession(r.nextSessionToken);toast('已換新 token');openShortcutTokenModal();}).catch(e=>toast(e.message||'更新失敗',true));}
function api(params){return fetchApi(params).catch(err=>{if(!CONFIG.USE_JSONP_FALLBACK)throw err;return jsonpApi(params).catch(()=>{throw err;});});}
function buildUrl(params,jsonp,cb){const u=new URL(CONFIG.GAS_API_URL);Object.keys(params||{}).forEach(k=>u.searchParams.set(k,String(params[k])));u.searchParams.set('frontendVersion',CONFIG.APP_VERSION);u.searchParams.set('_ts',Date.now());if(jsonp)u.searchParams.set('callback',cb);return u.toString();}
function fetchApi(params){return fetch(buildUrl(params,false,''),{method:'GET',cache:'no-store',credentials:'omit',headers:{'Accept':'application/json,text/plain,*/*','Cache-Control':'no-cache'}}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();}).then(t=>JSON.parse(t));}
function jsonpApi(params){return new Promise((resolve,reject)=>{const cb='__jsonp_'+Date.now()+'_'+Math.floor(Math.random()*99999),s=document.createElement('script'),timer=setTimeout(()=>clean(reject,new Error('JSONP 逾時')),15000);window[cb]=p=>clean(resolve,p);function clean(fn,v){clearTimeout(timer);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);fn(v);}s.onerror=()=>clean(reject,new Error('JSONP 失敗'));s.src=buildUrl(params,true,cb);document.head.appendChild(s);});}
function normalize(list){return(list||[]).map((x,i)=>{const fileId=String(x.fileId||x.id||x.driveId||'').trim();const stream=String(x.streamUrl||x.url||'').trim()||(fileId?'https://drive.google.com/uc?export=download&id='+encodeURIComponent(fileId):'');const type=normType(x.type||x.ext||x.mimeType||x.name||'');return{id:String(x.uid||x.playlistId||fileId||stream||i),fileId,name:String(x.name||x.fileName||x.title||('未命名 '+(i+1))),folder:String(x.folder||x.folderName||x.path||'未分類'),type,streamUrl:stream,vlcUrl:String(x.vlcUrl||'').trim()||('vlc://'+stream)};}).filter(x=>x.streamUrl);}
function renderMedia(){loading.style.display='none';main.innerHTML='';const q=(searchInput.value||'').toLowerCase().trim();const list=allMedia.filter(x=>(filterType==='all'||x.type===filterType)&&(!q||x.name.toLowerCase().includes(q)||x.folder.toLowerCase().includes(q)));renderSummary(list);if(!list.length){main.innerHTML='<div class="empty"><b>沒有可顯示歌曲</b><span>可能是搜尋條件、網址已停用、token 過期，或清單內檔案已移除。</span></div>';return;}const groups={};list.forEach(x=>(groups[x.folder]=groups[x.folder]||[]).push(x));Object.keys(groups).sort((a,b)=>a.localeCompare(b,'zh-Hant')).forEach(folder=>{const sec=document.createElement('section');sec.className='folder';sec.innerHTML='<div class="folder-head"><div class="folder-name">📁 '+esc(folder)+'</div><div class="count">'+groups[folder].length+' 個檔案</div></div>';const grid=document.createElement('div');grid.className='grid';groups[folder].forEach(item=>grid.appendChild(card(item)));sec.appendChild(grid);main.appendChild(sec);});}
function card(item){const el=document.createElement('article');el.className='media'+(selected.has(item.id)?' selected':'');el.innerHTML='<label class="check"><input type="checkbox" '+(selected.has(item.id)?'checked':'')+'></label><div class="media-top"><div class="icon">'+icon(item.type)+'</div><div><div class="name">'+esc(item.name)+'</div><div class="meta"><span class="badge '+(item.type||'other')+'">'+esc(item.type||'file')+'</span><span class="mini">'+esc(item.folder)+'</span></div></div></div><div class="row"><a class="action vlc" href="'+escAttr(item.vlcUrl)+'">▶ VLC 播放</a><a class="action open" href="'+escAttr(cacheBust(item.streamUrl))+'" target="_blank" rel="noopener">🌐 備用開啟</a><button class="action copy" type="button">📋 複製網址</button></div>';el.querySelector('input').addEventListener('change',e=>toggle(item.id,e.target.checked));el.querySelector('.copy').addEventListener('click',()=>copyText(item.streamUrl,'已複製網址'));return el;}
function toggle(id,on){on?selected.add(id):selected.delete(id);renderMedia();updatePanel();}
function getSelected(){return allMedia.filter(x=>selected.has(x.id));}
function updatePanel(){const items=getSelected();selCount.textContent=items.length;selSub.textContent=items.length?items.slice(0,3).map(x=>x.name).join('、')+(items.length>3?'...':''):'尚未選擇歌曲';panel.classList.toggle('show',!!items.length);}
function clearSelection(){selected=new Set();renderMedia();updatePanel();toast('已清除');}
function openSelectedInVlc(){const items=getSelected();if(!items.length)return toast('請先勾選歌曲',true);items.forEach((x,i)=>setTimeout(()=>location.href=x.vlcUrl,i*CONFIG.OPEN_VLC_DELAY_MS));}
function copySelectedUrls(){const items=getSelected();if(!items.length)return toast('請先勾選歌曲',true);copyText(items.map(x=>x.name+'\n'+x.streamUrl).join('\n\n'),'已複製播放清單網址');}
function renderSummary(list){summary.innerHTML='';[['目前顯示',list.length],['已選',selected.size],['MP3',list.filter(x=>x.type==='mp3').length],['MP4',list.filter(x=>x.type==='mp4').length],['WAV',list.filter(x=>x.type==='wav').length]].forEach(x=>{const d=document.createElement('div');d.className='sum';d.innerHTML='<small>'+x[0]+'</small><b>'+x[1]+'</b>';summary.appendChild(d);});summary.style.display='grid';}
function setTypeFilter(t){filterType=t;document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('active',b.dataset.type===t));renderMedia();}
function setLoading(text){loading.style.display='flex';loading.textContent=text;main.innerHTML='';}
function showError(e){loading.style.display='block';loading.innerHTML='<div class="err">讀取失敗：'+esc(e.message||e)+'</div><div class="hint">請檢查 GAS 部署、管理密鑰、網址是否停用，或 token 是否過期。</div>';}
function acceptNextSession(r){if(mode==='admin'&&r.nextSessionToken)setSession(r.nextSessionToken);}
function getSession(){try{return localStorage.getItem(CONFIG.SESSION_KEY)||'';}catch(e){return '';}}
function setSession(t){try{localStorage.setItem(CONFIG.SESSION_KEY,t);}catch(e){}}
function removeSession(){try{localStorage.removeItem(CONFIG.SESSION_KEY);}catch(e){}}
function clearFrontendCache(){try{sessionStorage.clear();}catch(e){}location.href=location.origin+location.pathname+(playlistToken?'?token='+encodeURIComponent(playlistToken):'?admin=1')+'&v='+Date.now();}
function showModal(title,text,box,actions){modalTitle.textContent=title;modalText.textContent=text;modalBox.value=box||'';modalList.innerHTML='';modalActions.innerHTML=actions||'<button onclick="closeModal()">關閉</button>';modalBg.classList.add('show');}
function closeModal(){modalBg.classList.remove('show');}
function copyModalText(){copyText(modalBox.value,'已複製');}
function copyShareUrl(){copyText(latestShareUrl,'已複製限定網址');}
function openShareUrl(){if(latestShareUrl)window.open(latestShareUrl,'_blank','noopener,noreferrer');}
function toast(msg,bad){const t=document.getElementById('toast');t.textContent=msg;t.style.background=bad?'rgba(239,68,68,.96)':'rgba(16,185,129,.96)';t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),2300);}
function copyText(text,msg){if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).then(()=>toast(msg||'已複製')).catch(()=>fallbackCopy(text,msg));}else fallbackCopy(text,msg);}
function fallbackCopy(text,msg){const el=document.createElement('textarea');el.value=text;el.style.position='fixed';el.style.left='-9999px';document.body.appendChild(el);el.select();try{document.execCommand('copy');toast(msg||'已複製');}catch(e){toast('複製失敗',true);}document.body.removeChild(el);}
function normType(t){t=String(t||'').toLowerCase().replace('.','');if(t.includes('mp3'))return'mp3';if(t.includes('mp4'))return'mp4';if(t.includes('wav'))return'wav';if(t.includes('m4a'))return'm4a';if(t.includes('aac'))return'aac';if(t.includes('flac'))return'flac';return t||'other';}
function icon(t){return t==='mp3'?'🎵':t==='mp4'?'🎬':t==='wav'?'🎧':'📄';}
function cacheBust(url){try{const u=new URL(url);u.searchParams.set('_cb',Date.now());return u.toString();}catch(e){return url;}}
function b64url(str){return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function escAttr(s){return esc(s).replace(/`/g,'&#096;');}
function escJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'');}
</script>
</body>
</html>
